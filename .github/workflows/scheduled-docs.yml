name: Scheduled Presentation Refresh

on:
  workflow_dispatch:
  schedule:
    # Runs twice a day to keep delivery artifacts updated.
    - cron: "0 9,18 * * *"

permissions:
  contents: write

jobs:
  refresh-presentation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-pptx

      - name: Regenerate presentation artifact
        run: |
          python scripts/build_presentacion_tfg.py

      - name: Commit and push only if there are real changes
        run: |
          if git diff --quiet; then
            echo "No content changes detected. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Presentacion_TFG_DentaLinkLab.pptx
          git commit -m "chore(presentation): refresh generated artifact"
          git push
