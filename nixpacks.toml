# Forzamos una sola fase de setup para evitar descargar múltiples Nixpkgs
[setup]
nixPkgs = ["python3", "nodejs_22", "postgresql_16.dev", "gcc", "curl", "wget"]

[install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
  "npm install --prefix frontend --legacy-peer-deps"
]

[build]
cmds = [
  ". /opt/venv/bin/activate && npm run build --prefix frontend",
  "python manage.py collectstatic --noinput",
  "python manage.py migrate"
]

[start]
cmd = ". /opt/venv/bin/activate && gunicorn talento360.wsgi:application --log-file -"
