<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Ejercicios - DIW</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
        }
        .ejercicios-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .ejercicio-btn {
            display: block;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .ejercicio-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
        .ejercicio-btn:active {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1>Índice de Ejercicios DIW</h1>

    <div class="ejercicios-container">
        <a href="E1.html" class="ejercicio-btn">Ejercicio 1</a>
        <a href="E2.html" class="ejercicio-btn">Ejercicio 2</a>
        <a href="E3.html" class="ejercicio-btn">Ejercicio 3</a>
        <a href="A4.html" class="ejercicio-btn">Ejercicio A4</a>
        <a href="E4.html" class="ejercicio-btn">Ejercicio 4</a>
        <a href="E5.html" class="ejercicio-btn">Ejercicio 5</a>
        <a href="act2.html" class="ejercicio-btn">Actividad 2</a>
    </div>
</body>
</html>
