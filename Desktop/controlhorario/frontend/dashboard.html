<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Horario - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>Control Horario</span>
            </div>
            <div class="nav-user">
                <span id="userName"></span>
                <button id="logoutBtn" class="btn-logout">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="welcome-card">
            <h1>Bienvenido, <span id="welcomeName"></span></h1>
            <p id="currentDate"></p>
        </div>

        <!-- Card de fichaje -->
        <div class="fichar-card">
            <h2>Fichaje</h2>
            <div id="fichajeStatus" class="fichaje-status">
                <p>Cargando estado...</p>
            </div>
            <div class="fichar-buttons">
                <button id="btnEntrada" class="btn-entrada" onclick="fichar('entrada')">
                    Registrar Entrada
                </button>
                <button id="btnSalida" class="btn-salida" onclick="fichar('salida')">
                    Registrar Salida
                </button>
            </div>
            <div id="mensaje" class="mensaje" style="display: none;"></div>
        </div>

        <!-- Historial de fichajes -->
        <div class="historial-card">
            <h2>Mis Fichajes Recientes</h2>
            <div class="filter-container">
                <label for="filterFecha">Filtrar por fecha:</label>
                <input type="date" id="filterFecha" onchange="cargarFichajes()">
                <button onclick="limpiarFiltro()" class="btn-secondary">Ver Todos</button>
            </div>
            <div id="fichajesLista" class="fichajes-lista">
                <p>Cargando...</p>
            </div>
        </div>

        <!-- Panel de admin (solo visible para admin) -->
        <div id="adminPanel" class="admin-panel" style="display: none;">
            <h2>Panel de Administración</h2>

            <div class="admin-section">
                <h3>Usuarios</h3>
                <div id="usuariosLista" class="usuarios-lista"></div>
            </div>

            <div class="admin-section">
                <h3>Fichajes de Todos los Usuarios</h3>
                <div class="filter-container">
                    <label for="adminFilterFecha">Fecha:</label>
                    <input type="date" id="adminFilterFecha" onchange="cargarFichajesAdmin()">
                    <button onclick="limpiarFiltroAdmin()" class="btn-secondary">Ver Todos</button>
                </div>
                <div id="fichajesAdminLista" class="fichajes-lista"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
