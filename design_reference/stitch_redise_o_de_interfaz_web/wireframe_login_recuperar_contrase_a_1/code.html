<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>

                      "inverse-surface": "#2a3138",
                      "on-primary-fixed-variant": "#004e5f",

                      "surface-dim": "#d4dbe3",
                      "outline-variant": "#bcc9ce",

                      "on-secondary-fixed-variant": "#0f4490",
                      "secondary-fixed-dim": "#aec6ff",

                      "on-tertiary-fixed-variant": "#004b74",
                      "error": "#ba1a1a",

<style>
        /* Ensuring strict wireframe mode overrides */
        .wireframe-border {
            border-width: 1px !important;
            border-style: solid !important;
            border-color: #6d797e !important; /* outline token */
        }
        .wireframe-fill {
            background-color: #f6f9ff !important; /* surface token */
        }
        .wireframe-text {
            color: #151c22 !important; /* on-surface token */
        }
        .wireframe-cross::before, .wireframe-cross::after {
            content: '';
            position: absolute;
            background-color: #bcc9ce; /* outline-variant */
        }
        .wireframe-cross::before { top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom right, transparent calc(50% - 0.5px), #bcc9ce calc(50% - 0.5px), #bcc9ce calc(50% + 0.5px), transparent calc(50% + 0.5px)); }
        .wireframe-cross::after { top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to top right, transparent calc(50% - 0.5px), #bcc9ce calc(50% - 0.5px), #bcc9ce calc(50% + 0.5px), transparent calc(50% + 0.5px)); }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex antialiased selection:bg-surface-variant selection:text-on-surface">
<!-- Left Panel: Split Screen Image Placeholder -->
<div class="hidden lg:flex w-1/2 bg-surface-container-high relative items-center justify-center border-r border-outline-variant overflow-hidden p-2xl">
<!-- Structural Wireframe Cross -->
<div class="absolute inset-0 wireframe-cross opacity-50 pointer-events-none"></div>
<!-- Placeholder Indicator -->
<div class="z-10 bg-surface px-lg py-md wireframe-border flex items-center gap-sm" data-alt="Monochrome geometric shapes representing a placeholder area in a minimalist architectural style">
<span class="material-symbols-outlined text-outline">image</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Image Placeholder</span>
</div>
</div>
<!-- Right Panel: Functional Form Area -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-xl md:p-2xl relative" data-alt="Subtle 8px wireframe grid pattern background indicating structural layout constraints" style="background-image: linear-gradient(to right, var(--tw-colors-surface-container-highest) 1px, transparent 1px), linear-gradient(to bottom, var(--tw-colors-surface-container-highest) 1px, transparent 1px); background-size: 8px 8px;">
<!-- Form Container / Card -->
<div class="w-full max-w-[440px] z-10 bg-surface p-xl md:p-2xl wireframe-border relative">
<!-- Wireframe Corner Markers -->
<div class="absolute top-0 left-0 w-3 h-3 border-t border-l border-on-surface -translate-x-px -translate-y-px"></div>
<div class="absolute top-0 right-0 w-3 h-3 border-t border-r border-on-surface translate-x-px -translate-y-px"></div>
<div class="absolute bottom-0 left-0 w-3 h-3 border-b border-l border-on-surface -translate-x-px translate-y-px"></div>
<div class="absolute bottom-0 right-0 w-3 h-3 border-b border-r border-on-surface translate-x-px translate-y-px"></div>
<!-- Logo Area -->
<div class="flex items-center gap-md mb-xl">
<div class="w-12 h-12 bg-surface-container border border-outline-variant flex items-center justify-center">
<span class="material-symbols-outlined text-primary">dentistry</span>
</div>
<span class="font-h3 text-h3 text-on-surface tracking-tight">DentaLink</span>
</div>
<!-- Header Text -->
<div class="mb-xl">
<h1 class="font-h2 text-h2 text-on-surface mb-xs">Iniciar Sesión</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Ingresa tus credenciales para acceder al sistema.</p>
</div>
<!-- Login Form State -->
<form class="flex flex-col gap-lg">
<!-- Email Input Group -->
<div class="flex flex-col gap-xs">
<label class="font-body-md text-body-md font-bold text-on-surface" for="email">Correo Electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">mail</span>
<input class="w-full bg-transparent border border-outline pl-[40px] pr-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-on-surface placeholder:text-outline-variant rounded-none" id="email" placeholder="nombre@ejemplo.com" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-xs">
<label class="font-body-md text-body-md font-bold text-on-surface" for="password">Contraseña</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">lock</span>
<input class="w-full bg-transparent border border-outline pl-[40px] pr-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-on-surface placeholder:text-outline-variant rounded-none" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Auxiliary Actions -->
<div class="flex items-center justify-between mt-xs">
<label class="flex items-center gap-sm cursor-pointer group">
<div class="w-4 h-4 border border-outline group-hover:border-on-surface bg-transparent flex items-center justify-center"></div>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface">Recordarme</span>
</label>
<!-- Prominent Recover Password Link -->
<a class="font-body-md text-body-md text-on-surface underline decoration-outline underline-offset-4 hover:decoration-on-surface font-semibold" href="#">
                        ¿Olvidaste tu contraseña?
                    </a>
</div>
<!-- Primary Action -->
<button class="w-full mt-md bg-on-surface text-surface py-md px-lg font-body-md text-body-md font-bold flex items-center justify-center gap-sm hover:bg-inverse-surface transition-colors border border-on-surface rounded-none" type="button">
                    Ingresar al Sistema
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Structural Divider -->
<div class="w-full flex items-center gap-md my-xl opacity-60">
<div class="h-px bg-outline flex-1"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Soporte Técnico</span>
<div class="h-px bg-outline flex-1"></div>
</div>
<!-- Alternative / Secondary Action -->
<button class="w-full bg-transparent text-on-surface py-md px-lg font-body-md text-body-md border border-outline flex items-center justify-center gap-sm hover:bg-surface-variant transition-colors rounded-none" type="button">
<span class="material-symbols-outlined text-[18px]">help</span>
                Contactar Administrador
            </button>
</div>
<!-- Wireframe Annotation (Optional conceptual touch for low-fi) -->
<div class="absolute bottom-xl right-xl hidden xl:flex items-center gap-sm text-outline-variant">
<span class="material-symbols-outlined text-[16px]">straighten</span>
<span class="font-code text-code">8px Grid System</span>
</div>
</div>
</body></html>
