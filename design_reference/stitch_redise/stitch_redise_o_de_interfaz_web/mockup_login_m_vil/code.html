<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                            "error": "#ba1a1a",
                            "on-secondary-fixed": "#001a42",
                            "on-error": "#ffffff",
                            "tertiary-container": "#58acee",
                            "secondary": "#315ca9",
                            "inverse-surface": "#2a3138",
                            "surface-bright": "#f6f9ff",

                            "on-secondary": "#ffffff",
                            "background": "#f6f9ff",
                            "tertiary-fixed-dim": "#94ccff",
                            "surface-container": "#e8eef7",

                            "DEFAULT": "0.125rem",

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-container-lowest text-on-surface h-screen flex flex-col justify-center items-center p-gutter">
<main class="w-full max-w-[400px] flex flex-col gap-xl">
<header class="flex flex-col items-center gap-sm text-center">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-sm shadow-sm">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1; font-size: 32px;">dentistry</span>
</div>
<h1 class="font-h1 text-h1 text-primary">CodeNext</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Dental Management Portal</p>
</header>
<form class="flex flex-col gap-md w-full">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">mail</span>
<input class="w-full bg-surface pl-10 pr-4 py-3 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="email" placeholder="doctor@clinic.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">lock</span>
<input class="w-full bg-surface pl-10 pr-10 py-3 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary py-3 rounded-lg font-body-md text-body-md font-semibold hover:bg-primary-container hover:text-on-primary-container transition-colors mt-sm shadow-sm active:opacity-80" type="submit">
                Sign In
            </button>
</form>
<footer class="text-center mt-lg">
<p class="font-body-md text-body-md text-on-surface-variant">
                Need access? <a class="text-primary font-semibold hover:underline" href="#">Contact Administrator</a>
</p>
</footer>
</main>
</body></html>
