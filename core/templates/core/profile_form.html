{% extends 'base.html' %} {% block content %}
<div class="max-w-4xl mx-auto">
  <div class="glass p-8 rounded-xl border border-slate-700">
    <h2 class="text-3xl font-bold mb-6">Editar Tu Perfil</h2>

    <form method="post" enctype="multipart/form-data" class="space-y-8">
      {% csrf_token %}

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Basic Info -->
        <div class="space-y-4">
          <h3 class="text-xl font-semibold border-b border-slate-700 pb-2">
            Información Profesional
          </h3>

          <div>
            <label class="block text-slate-400 mb-1"
              >Tu Nombre de Usuario</label
            >
            <input
              type="text"
              value="{{ user.username }}"
              disabled
              class="w-full bg-slate-900/50 border border-slate-700 rounded px-4 py-2 text-slate-500 cursor-not-allowed"
            />
          </div>

          <div>
            <label class="block text-slate-400 mb-1">Departamento</label>
            <input
              type="text"
              name="department"
              value="{{ profile.department }}"
              class="w-full bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500"
            />
          </div>

          <div>
            <label class="block text-slate-400 mb-1">Cargo / Rol</label>
            <input
              type="text"
              name="position"
              value="{{ profile.position }}"
              class="w-full bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500"
            />
          </div>

          <div>
            <label class="block text-slate-400 mb-1">Biografía Corta</label>
            <textarea
              name="bio"
              rows="4"
              class="w-full bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500"
            >
{{ profile.bio }}</textarea
            >
          </div>
        </div>

        <!-- Skills -->
        <div class="space-y-4">
          <h3 class="text-xl font-semibold border-b border-slate-700 pb-2">
            Tus Habilidades
          </h3>

          <div x-data="{ open: false }">
            <label class="block text-slate-400 mb-1"
              >¿Qué puedes enseñar? (Skills Offered)</label
            >
            <select
              name="skills_offered"
              multiple
              class="w-full h-40 bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500"
            >
              {% for skill in all_skills %}
              <option
                value="{{ skill.id }}"
                {%
                if
                skill
                in
                profile.skills_offered.all
                %}selected{%
                endif
                %}
              >
                {{ skill.name }} ({{ skill.get_category_display }})
              </option>
              {% endfor %}
            </select>
            <p class="text-xs text-slate-500 mt-1">
              Mantén presionado Ctrl (Windows) o Cmd (Mac) para seleccionar
              varias.
            </p>
          </div>

          <div class="mt-4">
            <label class="block text-slate-400 mb-1"
              >¿Qué quieres aprender? (Skills Wanted)</label
            >
            <select
              name="skills_wanted"
              multiple
              class="w-full h-40 bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white focus:outline-none focus:border-purple-500"
            >
              {% for skill in all_skills %}
              <option
                value="{{ skill.id }}"
                {%
                if
                skill
                in
                profile.skills_wanted.all
                %}selected{%
                endif
                %}
              >
                {{ skill.name }} ({{ skill.get_category_display }})
              </option>
              {% endfor %}
            </select>
            <p class="text-xs text-slate-500 mt-1">
              Selecciona las habilidades que te interesa desarrollar.
            </p>
          </div>
        </div>
      </div>

      <div class="flex justify-end pt-6 border-t border-slate-700">
        <button
          type="submit"
          class="px-8 py-3 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-full font-bold shadow-lg transition transform hover:-translate-y-0.5"
        >
          Guardar Cambios
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
